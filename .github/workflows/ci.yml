name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write
  # @anthonycoffey/periscope ships from GitHub Packages; the workflow's
  # GITHUB_TOKEN (with packages: read) authenticates the npm install.
  packages: read

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # The committed `.npmrc` references `${GITHUB_PACKAGES_TOKEN}` for
        # the GitHub Packages registry. The workflow's per-run GITHUB_TOKEN
        # (granted packages: read in the top-level permissions block)
        # satisfies that reference. Same name everywhere: local shell,
        # Vercel env, and these workflows.
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ESLint
        run: npm run lint

  unit:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # The committed `.npmrc` references `${GITHUB_PACKAGES_TOKEN}` for
        # the GitHub Packages registry. The workflow's per-run GITHUB_TOKEN
        # (granted packages: read in the top-level permissions block)
        # satisfies that reference. Same name everywhere: local shell,
        # Vercel env, and these workflows.
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # The committed `.npmrc` references `${GITHUB_PACKAGES_TOKEN}` for
        # the GitHub Packages registry. The workflow's per-run GITHUB_TOKEN
        # (granted packages: read in the top-level permissions block)
        # satisfies that reference. Same name everywhere: local shell,
        # Vercel env, and these workflows.
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run typecheck
        run: npm run typecheck
