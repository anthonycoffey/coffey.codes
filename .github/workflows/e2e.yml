name: E2E Tests

on:
  deployment_status:

permissions:
  contents: read
  statuses: write
  # @anthonycoffey/periscope ships from GitHub Packages; npm ci needs
  # auth via the workflow's GITHUB_TOKEN.
  packages: read

concurrency:
  group: e2e-${{ github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-22.04
    # Microsoft's pre-baked Playwright image ships with Node, chromium,
    # firefox, webkit, ffmpeg, and all required apt deps already
    # installed. Running the job inside the container bypasses the
    # `playwright install` step entirely — that command was hanging
    # silently for >19 minutes after the Chrome ZIP downloaded
    # (extract/verify never returns), timing out every run since
    # 2026-05-27 on both `ubuntu-latest` (noble) and `ubuntu-22.04`
    # (jammy). The image tag MUST match the @playwright/test version
    # in package.json; bump both together.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
      options: --user 1001
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Install dependencies
        # The committed `.npmrc` references `${GITHUB_PACKAGES_TOKEN}` for
        # the GitHub Packages registry. The workflow's per-run GITHUB_TOKEN
        # (granted packages: read in the top-level permissions block)
        # satisfies that reference. Same name everywhere: local shell,
        # Vercel env, and these workflows.
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E tests against preview
        run: npx playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Notify Vercel
        if: always()
        # The status action derives success/error automatically from the job's
        # step conclusions via its post hook — there is no `state` input (passing
        # one is silently ignored and warns). It only takes `name` + token.
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: 'Vercel - coffey-codes: Playwright E2E Tests'
          github_token: ${{ secrets.GITHUB_TOKEN }}
