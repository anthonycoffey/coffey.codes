name: E2E Tests

on:
  deployment_status:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

concurrency:
  group: e2e-${{ github.event.deployment.sha || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright
    if: |
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
      || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: playwright
        run: npx playwright test --project=chromium
        env:
          CI: true
          # On deployment_status events, hit the deployment's target URL (preview or production).
          # On push to main, hit the live production domain since no deployment URL is in the event payload.
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url || 'https://coffey.codes' }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Notify Vercel
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: 'Vercel - coffey-codes: Playwright E2E Tests'
          state: ${{ steps.playwright.outcome == 'success' && 'success' || 'error' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
